    <script type="text/javascript">

        var valStr = "";

        $(document).ready(function () {
            hdnEmailFor = $('#hdnEmailFor');
            hdnLoginFor = $('#hdnLoginFor');
            ddlemailFor = $('#ddlemailFor');

            if ('0' == "1") {
                OnemailFor();
                $('#ddlemailFor').change(OnemailFor);
            }
            else {
                HideShowLogin('2');

                // Only bind click events to buttons that exist
                if ($('#login_submit').length) {
                    $('#login_submit').click(onsubmitClick);
                }
                if ($('#login_submitStudent').length) {
                    $('#login_submitStudent').click(onsubmitStudentClick);
                }
                if ($('#login_submitParent').length) {
                    $('#login_submitParent').click(onsubmitParentClick);
                }
                if ($('#login_hideStudent').length) {
                    $('#login_hideStudent').click(onhideStudentClick);
                }
                if ($('#login_hideParent').length) {
                    $('#login_hideParent').click(onhideParentClick);
                }
            }

            // Username domain cleaning and filtering
            $('#txtUserName').on('input', function() {
                filterUsernameInput();
            });

            $('#txtUserName').on('keypress', function(event) {
                return preventDomainInput(event);
            });

            $('#txtUserName').on('paste', function() {
                setTimeout(function() {
                    cleanUsernameField();
                    filterUsernameInput();
                }, 10);
            });

            // Clean username on page load
            setTimeout(function() {
                cleanUsernameField();
            }, 200);

            DisableRightClick();
        });

        function onhideParentClick() {
            $('#spnEmailID').show();
            $('#login_submitStudent').show();
            $('#login_hideStudent').show();
            $('#show_hide_password').show();

            $('#login_submitParent').hide();
            $('#login_hideParent').hide();
        }

        function onhideStudentClick() {
            $('#spnEmailID').hide();
            $('#login_submitStudent').hide();
            $('#login_hideStudent').hide();
            $('#show_hide_password').hide();

            $('#login_submitParent').show();
            $('#login_hideParent').show();
        }

        function DisableRightClick() {
            if (document.layers) {
                document.captureEvents(Event.MOUSEDOWN);
                document.onmousedown = function () {
                    return false;
                };
            }
            else {
                document.onmouseup = function (e) {
                    if (e != null && e.type == "mouseup") {
                        if (e.which == 2 || e.which == 3) {
                            return false;
                        }
                    }
                };
            }

            document.oncontextmenu = function () {
                return false;
            };

            window.onkeydown = function (event) {
                var charCode = (event.which) ? event.which : event.keyCode;
                if (charCode == 13) {
                    event.preventDefault();
                }
            };
        }

        function DisableBackButton() {
            window.history.forward()
        }

        function onsubmitClick() {
            $('#hdnLoginFor').val("1");
            hdnEmailFor.val("@jaipur.manipal.edu");
            if ('0' == "1") {
                ddlemailFor.val("J");
            }
        }

        function onsubmitStudentClick() {
            $('#hdnLoginFor').val("2");
            hdnEmailFor.val("@muj.manipal.edu");
            if ('0' == "1") {
                ddlemailFor.val("M");
            }
        }

        function onsubmitParentClick() {
            $('#hdnLoginFor').val("3");
            hdnEmailFor.val("");
        }

        function HideShowLogin(type) {
            // Hide elements only if they exist
            if ($('#dvFacultyLogin').length) {
                $('#dvFacultyLogin').hide();
            }
            if ($('#dvStudentLogin').length) {
                $('#dvStudentLogin').hide();
            }

            if (type == 1) {
                if ($('#dvFacultyLogin').length) {
                    $('#dvFacultyLogin').show();
                }
                if ($('#spnEmailID').length) {
                    $('#spnEmailID').html("@jaipur.manipal.edu");
                }
            }
            else {
                if ($('#dvStudentLogin').length) {
                    $('#dvStudentLogin').show();
                }
                if ($('#spnEmailID').length) {
                    $('#spnEmailID').html("@muj.manipal.edu");
                }

                if(type == 2) {
                    onhideParentClick();
                }
                else {
                    onhideStudentClick();
                }
            }
        }

        function OnemailFor() {
            if (ddlemailFor.val() == "M") {
                hdnEmailFor.val("@muj.manipal.edu");
                $('#hdnLoginFor').val("2");
            }
            else {
                hdnEmailFor.val("@jaipur.manipal.edu");
                $('#hdnLoginFor').val("1");
            }
        }

        // Clean username field by removing domain if present
        function cleanUsernameField() {
            var usernameField = $('#txtUserName');
            var currentUsername = usernameField.val();

            if (currentUsername && currentUsername.includes('@')) {
                // Remove @ and anything after it, and specific domain patterns
                var cleanUsername = currentUsername
                    .replace(/@.*$/i, '') // Remove @ and everything after
                    .replace(/\.edu/gi, '') // Remove ".edu" text
                    .replace(/\.com/gi, '') // Remove ".com" text
                    .replace(/manipal\.edu/gi, '') // Remove specific domain
                    .replace(/jaipur\.manipal\.edu/gi, '') // Remove specific domain
                    .replace(/muj\.manipal\.edu/gi, ''); // Remove specific domain
                    // Don't remove all dots - allow them for username format like name.registration_no

                // More targeted removal - only remove domain-specific words in context
                if (cleanUsername.toLowerCase().includes('manipal') &&
                    (currentUsername.toLowerCase().includes('.edu') || currentUsername.includes('@'))) {
                    cleanUsername = cleanUsername.replace(/manipal/gi, '');
                }

                if (cleanUsername.toLowerCase().includes('jaipur') &&
                    (currentUsername.toLowerCase().includes('manipal') || currentUsername.includes('@'))) {
                    cleanUsername = cleanUsername.replace(/jaipur/gi, '');
                }

                // Only update if the username actually changed
                if (cleanUsername !== currentUsername) {
                    usernameField.val(cleanUsername);

                    // Restore cursor position (adjust if content was removed)
                    var cursorPosition = usernameField[0].selectionStart;
                    var newPosition = Math.min(cursorPosition, cleanUsername.length);
                    usernameField[0].setSelectionRange(newPosition, newPosition);
                }
            }
        }

        // Real-time input filtering to prevent domain entry
        function filterUsernameInput() {
            var usernameField = $('#txtUserName');
            var currentValue = usernameField.val();
            var cursorPosition = usernameField[0].selectionStart;

            // Remove @ and anything after it, and specific domain patterns
            var filteredValue = currentValue
                .replace(/@.*$/i, '') // Remove @ and everything after
                .replace(/\.edu/gi, '') // Remove ".edu" text
                .replace(/\.com/gi, '') // Remove ".com" text
                .replace(/manipal\.edu/gi, '') // Remove specific domain
                .replace(/jaipur\.manipal\.edu/gi, '') // Remove specific domain
                .replace(/muj\.manipal\.edu/gi, ''); // Remove specific domain
                // Don't remove all dots - allow them for username format like name.registration_no

            // More targeted removal - only remove domain-specific words in context
            if (filteredValue.toLowerCase().includes('manipal') &&
                (currentValue.toLowerCase().includes('.edu') || currentValue.includes('@'))) {
                filteredValue = filteredValue.replace(/manipal/gi, '');
            }

            if (filteredValue.toLowerCase().includes('jaipur') &&
                (currentValue.toLowerCase().includes('manipal') || currentValue.includes('@'))) {
                filteredValue = filteredValue.replace(/jaipur/gi, '');
            }

            // Only update if the value changed
            if (filteredValue !== currentValue) {
                usernameField.val(filteredValue);

                // Restore cursor position (adjust if content was removed)
                var newPosition = Math.min(cursorPosition, filteredValue.length);
                usernameField[0].setSelectionRange(newPosition, newPosition);
            }
        }

        // Prevent typing domain-related characters
        function preventDomainInput(event) {
            var charCode = event.which || event.keyCode;
            var char = String.fromCharCode(charCode);
            var currentValue = $('#txtUserName').val();

            // Allow control keys (backspace, delete, tab, etc.)
            if (charCode < 32 || charCode === 127) {
                return true;
            }

            // Block @ symbol entirely
            if (char === '@') {
                event.preventDefault();
                return false;
            }

            // Allow dots in general (for username format like name.registration_no)
            // but block specific domain patterns
            var potentialValue = (currentValue + char).toLowerCase();

            // Block specific domain-related sequences
            if (potentialValue.includes('@') ||
                potentialValue.endsWith('.edu') ||
                potentialValue.endsWith('.com') ||
                potentialValue.includes('manipal.edu') ||
                potentialValue.includes('jaipur.manipal') ||
                potentialValue.includes('muj.manipal') ||
                (currentValue.toLowerCase().includes('manipal') && char === '.' &&
                 (potentialValue.endsWith('manipal.') || potentialValue.includes('manipal.edu'))) ||
                (currentValue.toLowerCase().includes('jaipur') && char === '.' &&
                 potentialValue.includes('jaipur.manipal')) ||
                (currentValue.toLowerCase().includes('muj') && char === '.' &&
                 potentialValue.includes('muj.manipal'))) {
                event.preventDefault();
                return false;
            }

            return true;
        }


    </script>
